<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Slingers — Soft Hand-Drawn Storybook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Patrick+Hand&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/mock.css">
<link rel="stylesheet" href="tokens-handdrawn.css">
</head>
<body>
  <div class="title">STAR SLINGERS<small>Soft Hand-Drawn Storybook</small></div>

  <div class="phone">
    <div class="screen">
      <!--
        CANONICAL LAYOUT — viewBox 360x740 (≈ Pixel 6 portrait).
        Style variants: copy this file, swap the tokens link, and re-skin.
        You may redraw art INSIDE the slot <g> elements (and add <defs>),
        but keep every slot's transform/position, the class hooks, and the
        annotation block untouched so layout parity holds across variants.
      -->
      <svg id="scene" viewBox="0 0 360 740" preserveAspectRatio="xMidYMid slice">

        <defs>
          <!-- crayon wobble: light turbulence displacement for hand-drawn edges -->
          <filter id="crayon" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.018 0.024" numOctaves="2" seed="7" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
          <filter id="crayonSoft" x="-40%" y="-40%" width="180%" height="180%">
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="3" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="1.6" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
          <filter id="crayonGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feTurbulence type="fractalNoise" baseFrequency="0.02 0.03" numOctaves="2" seed="11" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G" result="d"/>
            <feGaussianBlur in="d" stdDeviation="2.4" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="d"/></feMerge>
          </filter>
          <!-- cozy painted night-sky gradient -->
          <radialGradient id="skywash" cx="62%" cy="38%" r="85%">
            <stop offset="0%" stop-color="#3a3358"/>
            <stop offset="55%" stop-color="#2a2440"/>
            <stop offset="100%" stop-color="#201a32"/>
          </radialGradient>
          <!-- warm crayon-shaded hull paper -->
          <linearGradient id="hullpaper" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#d8b489"/>
            <stop offset="100%" stop-color="#a8835f"/>
          </linearGradient>
        </defs>

        <rect class="bg-wash" width="360" height="740"/>
        <g class="stars">
          <path class="star" d="M220,116 l1.4,3.6 l3.6,1.4 l-3.6,1.4 l-1.4,3.6 l-1.4,-3.6 l-3.6,-1.4 l3.6,-1.4 Z"/>
          <path class="star" d="M300,87 l1,2.6 l2.6,1 l-2.6,1 l-1,2.6 l-1,-2.6 l-2.6,-1 l2.6,-1 Z"/>
          <path class="star" d="M330,355 l1.6,4 l4,1.6 l-4,1.6 l-1.6,4 l-1.6,-4 l-4,-1.6 l4,-1.6 Z"/>
          <path class="star" d="M250,637 l1,2.6 l2.6,1 l-2.6,1 l-1,2.6 l-1,-2.6 l-2.6,-1 l2.6,-1 Z"/>
          <path class="star" d="M200,556 l1.2,3.2 l3.2,1.2 l-3.2,1.2 l-1.2,3.2 l-1.2,-3.2 l-3.2,-1.2 l3.2,-1.2 Z"/>
          <path class="star" d="M320,537 l1,2.6 l2.6,1 l-2.6,1 l-1,2.6 l-1,-2.6 l-2.6,-1 l2.6,-1 Z"/>
          <path class="star" d="M160,376 l1.1,2.9 l2.9,1.1 l-2.9,1.1 l-1.1,2.9 l-1.1,-2.9 l-2.9,-1.1 l2.9,-1.1 Z"/>
          <path class="star" d="M290,266 l1.3,3.4 l3.4,1.3 l-3.4,1.3 l-1.3,3.4 l-1.3,-3.4 l-3.4,-1.3 l3.4,-1.3 Z"/>
        </g>

        <!-- ===== SLOT: station (left long side) ===== -->
        <g class="slot-station">
          <path class="hull" d="M0,230 h26 a18 18 0 0 1 18 18 v244 a18 18 0 0 1 -18 18 H0 Z"/>
          <g class="hull-details">
            <circle class="hull-detail" cx="22" cy="290" r="6"/>
            <circle class="hull-detail" cx="22" cy="330" r="6"/>
            <circle class="hull-detail" cx="22" cy="410" r="6"/>
            <circle class="hull-detail" cx="22" cy="450" r="6"/>
            <rect class="hull-window" x="14" y="356" width="16" height="28" rx="7"/>
          </g>
        </g>

        <!-- ===== SLOT: shield arc (vertical, bulging right, 3 segments) ===== -->
        <g class="slot-shield">
          <g class="shield-glow">
            <path class="shield" d="M0,250 A120 120 0 0 1 0,490"/>
          </g>
          <g class="shield-dividers">
            <line class="shield-divider" x1="100" y1="306" x2="108" y2="309"/>
            <line class="shield-divider" x1="100" y1="431" x2="108" y2="434"/>
          </g>
        </g>

        <!-- ===== SLOT: enemies (sweep right -> left) ===== -->
        <g class="slot-enemies">
          <!-- asteroid 1: tough, shows hits-to-break — wobbly lumpy rock -->
          <g class="driftX"><g class="asteroid" transform="translate(285,330)">
            <path class="rock" d="M-19,-9 Q-22,-19 -9,-20 Q2,-23 12,-17 Q22,-12 20,0 Q23,11 12,18 Q1,23 -10,19 Q-21,15 -20,3 Z"/>
            <circle class="crater" cx="-6" cy="-5" r="5"/>
            <circle class="crater" cx="8" cy="4" r="4"/>
            <text class="hit-count display-text" y="7" text-anchor="middle">2</text>
          </g></g>
          <!-- asteroid 2: small lumpy rock -->
          <g class="driftX2"><g class="asteroid" transform="translate(312,520)">
            <path class="rock" d="M-12,-5 Q-13,-12 -5,-12 Q4,-14 10,-7 Q14,-1 11,6 Q5,13 -3,12 Q-12,11 -13,3 Z"/>
            <circle class="crater" cx="3" cy="-3" r="3"/>
          </g></g>
          <!-- enemy ship 1: points left, jukes, shoots toward station -->
          <g class="jukeY"><g class="ship" transform="translate(278,210)">
            <path class="ship-body" d="M-16,1 Q-3,-3 11,-12 Q5,-3 5,0 Q5,3 11,12 Q-3,5 -16,-1 Q-18,0 -16,1 Z"/>
            <circle class="ship-cockpit" cx="2" r="3.8"/>
            <circle class="ship-cockpit-core" cx="2" r="1.8"/>
            <rect class="bolt laser" x="-26" y="-1.6" width="14" height="3.2" rx="1.6"/>
          </g></g>
          <!-- enemy ship 2 -->
          <g class="jukeY2"><g class="ship" transform="translate(305,455)">
            <path class="ship-body" d="M-13,1 Q-2,-2 9,-10 Q4,-2 4,0 Q4,2 9,10 Q-2,4 -13,-1 Q-15,0 -13,1 Z"/>
            <circle class="ship-cockpit" cx="1.5" r="3.2"/>
            <rect class="bolt2 laser" x="-22" y="-1.4" width="12" height="2.8" rx="1.4"/>
          </g></g>
        </g>

        <!-- ===== SLOT: P1 slingshot (top edge, drawn back, aiming at ship 1) ===== -->
        <g class="slot-p1">
          <path class="sling-frame" d="M180,18 L180,52 M180,52 L164,80 M180,52 L196,80"/>
          <path class="sling-band-p1" d="M164,80 L180,42 M196,80 L180,42"/>
          <g class="rocket-nock" transform="translate(180,46) rotate(35)">
            <path class="rocket" d="M0,-10 Q3,-3 4,2 Q2,5 0,5 Q-2,5 -4,2 Q-3,-3 0,-10 Z"/>
          </g>
          <text class="ammo-p1 display-text" x="206" y="42">5</text>
          <path class="trajectory" d="M180,50 Q236,118 264,196"/>
        </g>

        <!-- ===== SLOT: P2 slingshot (bottom edge, at rest) ===== -->
        <g class="slot-p2">
          <path class="sling-frame" d="M180,722 L180,688 M180,688 L164,660 M180,688 L196,660"/>
          <path class="sling-band-p2" d="M164,660 Q180,672 196,660"/>
          <text class="ammo-p2 display-text" x="206" y="714">5</text>
        </g>

        <!-- ===== SLOT: HUD (top-left, above station) ===== -->
        <g class="slot-hud">
          <text class="hud-label body-text" x="16" y="40">WAVE</text>
          <text class="hud-value display-text" x="16" y="64">3</text>
          <text class="hud-label body-text" x="16" y="96">SCORE</text>
          <text class="hud-score display-text" x="16" y="120">1240</text>
        </g>

        <!-- ===== ANNOTATIONS (do not modify in style variants) ===== -->
        <g class="annot">
          <line class="leader" x1="44" y1="370" x2="96" y2="370"/>
          <g transform="translate(100,364)"><rect class="label-bg" x="0" y="-11" width="118" height="16" rx="8"/><text class="label-tag" x="7" y="1">station you protect</text></g>

          <line class="leader" x1="118" y1="370" x2="150" y2="320"/>
          <g transform="translate(154,314)"><rect class="label-bg" x="0" y="-11" width="156" height="16" rx="8"/><text class="label-tag" x="7" y="1">shield arc · 3 segments left</text></g>

          <line class="leader" x1="262" y1="330" x2="240" y2="296"/>
          <g transform="translate(150,290)"><rect class="label-bg" x="0" y="-11" width="156" height="16" rx="8"/><text class="label-tag" x="7" y="1">asteroid · "2" = hits to break</text></g>

          <line class="leader" x1="270" y1="200" x2="208" y2="170"/>
          <g transform="translate(36,164)"><rect class="label-bg" x="0" y="-11" width="176" height="16" rx="8"/><text class="label-tag" x="7" y="1">enemy ship · jukes &amp; shoots</text></g>

          <line class="leader" x1="200" y1="90" x2="234" y2="90"/>
          <g transform="translate(238,84)"><rect class="label-bg" x="0" y="-11" width="108" height="16" rx="8"/><text class="label-tag" x="7" y="1">P1 (top) · drags down</text></g>

          <line class="leader" x1="200" y1="660" x2="234" y2="640"/>
          <g transform="translate(238,634)"><rect class="label-bg" x="0" y="-11" width="112" height="16" rx="8"/><text class="label-tag" x="7" y="1">P2 (bottom) · drags up</text></g>

          <g class="annot-flow">
            <path class="leader" d="M300,580 L150,580"/>
            <path class="label-bg" d="M150,580 l10,-6 v12 z"/>
            <g transform="translate(168,560)"><rect class="label-bg" x="0" y="-11" width="150" height="16" rx="8"/><text class="label-tag" x="7" y="1">enemies sweep toward station</text></g>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <div class="controls"><button class="btn" id="toggle">Hide labels</button></div>
  <p class="caption">Static layout mock — not playable. <b>P1 sits at the top</b>, <b>P2 at the bottom</b>, facing each other. The station runs down the left wall behind its shield arc; <b>asteroids and juking ships sweep in from the right</b>. Each player lobs shots across to intercept.</p>

  <script src="../shared/mock.js"></script>
</body>
</html>
