<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Slingers — UI Mock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --space-0:#070617;
    --space-1:#0e0b2e;
    --p1:#3fe0ff;      /* player 1 / left  */
    --p2:#ffb13b;      /* player 2 / right */
    --danger:#ff4d7d;  /* enemy ships      */
    --shield:#8af7ff;
    --rock:#8a7d6b;
    --rock-dark:#5d5345;
    --ink:#eafaff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(900px 600px at 20% -10%, #2a1a55 0%, transparent 55%),
      radial-gradient(700px 700px at 100% 110%, #102a4d 0%, transparent 55%),
      var(--space-0);
    color:var(--ink);
    font-family:'Fredoka',sans-serif;
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    padding:24px 12px 36px;
  }
  .caption{
    text-align:center;max-width:440px;line-height:1.5;
    font-size:14px;color:#b9c2e8;
  }
  .caption b{color:var(--ink);font-weight:600;}
  .title{
    font-family:'Audiowide',cursive;
    font-size:22px;letter-spacing:1px;
    color:var(--ink);
    text-shadow:0 0 18px rgba(63,224,255,.45);
    text-align:center;
  }
  .title small{display:block;font-family:'Fredoka';font-size:11px;letter-spacing:2px;color:#7d8bbd;margin-top:4px;text-transform:uppercase;}

  /* phone frame */
  .phone{
    position:relative;
    width:min(92vw, 360px);
    aspect-ratio:360/740;
    border-radius:42px;
    padding:10px;
    background:linear-gradient(160deg,#1b1c2e,#070713);
    box-shadow:
      0 0 0 2px #2c2e44,
      0 30px 80px rgba(0,0,0,.6),
      inset 0 0 0 1px rgba(255,255,255,.04);
  }
  .screen{
    position:relative;width:100%;height:100%;
    border-radius:34px;overflow:hidden;
    background:linear-gradient(180deg,#0b0a24 0%,#0a0a1c 55%,#070612 100%);
  }
  svg{display:block;width:100%;height:100%;}

  .controls{display:flex;gap:10px;}
  .btn{
    font-family:'Fredoka';font-weight:600;font-size:13px;
    color:var(--ink);background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.14);
    padding:8px 16px;border-radius:999px;cursor:pointer;
    transition:all .15s ease;
  }
  .btn:hover{background:rgba(63,224,255,.14);border-color:var(--p1);}

  /* annotation labels */
  .label-tag{font-family:'Fredoka';font-weight:600;font-size:9.5px;fill:#0a0a1c;}
  .label-bg{fill:#eafaff;opacity:.92;}
  .leader{stroke:#eafaff;stroke-width:1;opacity:.5;stroke-dasharray:2 2;}
  .labels-off .annot{display:none;}

  /* animations */
  @keyframes drift{from{transform:translateY(-6px);}to{transform:translateY(10px);}}
  @keyframes juke{0%{transform:translateX(-10px);}50%{transform:translateX(12px);}100%{transform:translateX(-10px);}}
  @keyframes twinkle{0%,100%{opacity:.25;}50%{opacity:1;}}
  @keyframes laser{0%{transform:translateY(0);opacity:0;}20%{opacity:1;}100%{transform:translateY(120px);opacity:0;}}
  @keyframes shieldpulse{0%,100%{opacity:.55;}50%{opacity:.9;}}
  .drift{animation:drift 3.4s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:center;}
  .drift2{animation:drift 4.6s ease-in-out infinite alternate;transform-box:fill-box;}
  .ship{animation:juke 3.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
  .ship2{animation:juke 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
  .star{animation:twinkle 2.6s ease-in-out infinite;}
  .bolt{animation:laser 1.6s ease-in infinite;transform-box:fill-box;}
  .bolt2{animation:laser 1.9s ease-in infinite .5s;transform-box:fill-box;}
  .shieldarc{animation:shieldpulse 2.8s ease-in-out infinite;}
</style>
</head>
<body>
  <div class="title">STAR SLINGERS<small>UI Mockup · Portrait · Co-op</small></div>

  <div class="phone">
    <div class="screen">
      <svg id="scene" viewBox="0 0 360 740" preserveAspectRatio="xMidYMid slice" class="">
        <defs>
          <radialGradient id="nebula" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#241a55" stop-opacity=".55"/>
            <stop offset="100%" stop-color="#0a0a1c" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="domeg" cx="50%" cy="25%" r="80%">
            <stop offset="0%" stop-color="#5fffd0"/>
            <stop offset="100%" stop-color="#1f8f7a"/>
          </radialGradient>
          <linearGradient id="rocketg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff"/>
            <stop offset="100%" stop-color="#ffb13b"/>
          </linearGradient>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- backdrop -->
        <rect width="360" height="740" fill="url(#nebula)"/>
        <!-- stars -->
        <g fill="#dfe9ff">
          <circle class="star" cx="40" cy="120" r="1.4"/>
          <circle class="star" cx="110" cy="80" r="1" style="animation-delay:.6s"/>
          <circle class="star" cx="300" cy="130" r="1.6" style="animation-delay:1.1s"/>
          <circle class="star" cx="250" cy="60" r="1" style="animation-delay:.3s"/>
          <circle class="star" cx="70" cy="260" r="1.2" style="animation-delay:1.4s"/>
          <circle class="star" cx="330" cy="300" r="1" style="animation-delay:.9s"/>
          <circle class="star" cx="180" cy="100" r="1.1" style="animation-delay:1.7s"/>
          <circle class="star" cx="20" cy="360" r="1.3" style="animation-delay:.2s"/>
          <circle class="star" cx="340" cy="220" r="1" style="animation-delay:2.0s"/>
        </g>

        <!-- ===== TOP HUD ===== -->
        <text x="22" y="40" font-family="Fredoka" font-weight="600" font-size="13" fill="#8b96c7">WAVE</text>
        <text x="22" y="62" font-family="Audiowide" font-size="22" fill="#eafaff">3</text>

        <text x="180" y="40" text-anchor="middle" font-family="Fredoka" font-weight="600" font-size="13" fill="#8b96c7">SCORE</text>
        <text x="180" y="64" text-anchor="middle" font-family="Audiowide" font-size="24" fill="#3fe0ff" filter="url(#glow)">1240</text>

        <circle cx="332" cy="46" r="15" fill="none" stroke="#3a3d5c" stroke-width="2"/>
        <rect x="328" y="40" width="3" height="12" rx="1.5" fill="#8b96c7"/>
        <rect x="334" y="40" width="3" height="12" rx="1.5" fill="#8b96c7"/>

        <!-- ===== ENEMIES ===== -->
        <!-- asteroid 1 -->
        <g class="drift">
          <g transform="translate(95,210)">
            <circle r="22" fill="var(--rock)"/>
            <circle r="22" fill="none" stroke="#3a342a" stroke-width="2"/>
            <circle cx="-6" cy="-5" r="5" fill="var(--rock-dark)"/>
            <circle cx="8" cy="4" r="4" fill="var(--rock-dark)"/>
            <circle cx="2" cy="-9" r="2.5" fill="var(--rock-dark)"/>
            <text y="6" text-anchor="middle" font-family="Audiowide" font-size="15" fill="#fff">2</text>
          </g>
        </g>
        <!-- asteroid 2 small -->
        <g class="drift2">
          <g transform="translate(300,250)">
            <circle r="14" fill="var(--rock)"/>
            <circle r="14" fill="none" stroke="#3a342a" stroke-width="2"/>
            <circle cx="4" cy="-3" r="3" fill="var(--rock-dark)"/>
            <circle cx="-4" cy="4" r="2.5" fill="var(--rock-dark)"/>
          </g>
        </g>

        <!-- enemy ship 1 (jukes + shoots) -->
        <g class="ship">
          <g transform="translate(150,150)">
            <path d="M0,-12 L16,8 L0,2 L-16,8 Z" fill="var(--danger)" stroke="#ffd0dd" stroke-width="1.2"/>
            <circle cy="-2" r="4" fill="#2a0b16"/>
            <circle cy="-2" r="2" fill="#ffe4ec"/>
            <!-- laser bolt -->
            <rect class="bolt" x="-1.6" y="10" width="3.2" height="14" rx="1.6" fill="#ff4d7d"/>
          </g>
        </g>
        <!-- enemy ship 2 -->
        <g class="ship2">
          <g transform="translate(245,200)">
            <path d="M0,-10 L13,7 L0,2 L-13,7 Z" fill="var(--danger)" stroke="#ffd0dd" stroke-width="1"/>
            <circle cy="-2" r="3" fill="#2a0b16"/>
            <rect class="bolt2" x="-1.4" y="8" width="2.8" height="12" rx="1.4" fill="#ff4d7d"/>
          </g>
        </g>

        <!-- ===== SHIELD ARC (3 segments) ===== -->
        <g class="shieldarc" filter="url(#glow)">
          <path d="M 60 740 A 120 120 0 0 1 300 740" fill="none" stroke="var(--shield)" stroke-width="5" stroke-linecap="round" opacity=".7"/>
        </g>
        <!-- shield segment ticks -->
        <g stroke="#0a0a1c" stroke-width="4">
          <line x1="150" y1="625" x2="153" y2="632"/>
          <line x1="210" y1="625" x2="207" y2="632"/>
        </g>

        <!-- ===== STATION DOME (semicircle, bottom center) ===== -->
        <path d="M 305 740 A 110 110 0 0 0 55 740 Z" fill="#0d1430"/>
        <path d="M 250 740 A 55 55 0 0 0 110 740 Z" fill="url(#domeg)"/>
        <circle cx="160" cy="720" r="5" fill="#0d2b24"/>
        <circle cx="180" cy="712" r="5" fill="#0d2b24"/>
        <circle cx="200" cy="720" r="5" fill="#0d2b24"/>

        <!-- ===== SLINGSHOTS ===== -->
        <!-- LEFT (player 1) at rest -->
        <g stroke-linecap="round">
          <path d="M50,738 L50,705 M50,710 L40,694 M50,710 L60,694" stroke="#5a4a7a" stroke-width="5" fill="none"/>
          <path d="M40,694 Q50,706 60,694" stroke="var(--p1)" stroke-width="2.5" fill="none" opacity=".8"/>
        </g>
        <text x="30" y="730" font-family="Audiowide" font-size="14" fill="var(--p1)">5</text>

        <!-- RIGHT (player 2) drawn back + trajectory -->
        <g stroke-linecap="round">
          <path d="M310,738 L310,705 M310,710 L300,694 M310,710 L320,694" stroke="#5a4a7a" stroke-width="5" fill="none"/>
          <!-- stretched band to pouch -->
          <path d="M300,694 L318,716 M320,694 L318,716" stroke="var(--p2)" stroke-width="2.5" fill="none"/>
          <!-- nocked rocket -->
          <g transform="translate(318,716) rotate(-35)">
            <path d="M0,-9 L4,2 L0,5 L-4,2 Z" fill="url(#rocketg)"/>
          </g>
        </g>
        <text x="324" y="730" font-family="Audiowide" font-size="14" fill="var(--p2)">5</text>
        <!-- dotted trajectory toward ship -->
        <path d="M318,712 Q230,560 158,168" fill="none" stroke="#ffd9a6" stroke-width="2" stroke-dasharray="2 7" stroke-linecap="round" opacity=".75"/>

        <!-- ================= ANNOTATIONS ================= -->
        <g class="annot">
          <!-- wave -->
          <line class="leader" x1="50" y1="72" x2="86" y2="96"/>
          <g transform="translate(86,90)"><rect class="label-bg" x="0" y="-11" width="118" height="16" rx="8"/><text class="label-tag" x="7" y="1">wave counts up</text></g>
          <!-- score -->
          <line class="leader" x1="200" y1="68" x2="246" y2="104"/>
          <g transform="translate(246,98)"><rect class="label-bg" x="0" y="-11" width="100" height="16" rx="8"/><text class="label-tag" x="7" y="1">shared score</text></g>
          <!-- asteroid -->
          <line class="leader" x1="73" y1="210" x2="14" y2="186"/>
          <g transform="translate(8,180)"><rect class="label-bg" x="0" y="-11" width="150" height="16" rx="8"/><text class="label-tag" x="7" y="1">asteroid · "2" = hits to break</text></g>
          <!-- ship -->
          <line class="leader" x1="166" y1="150" x2="232" y2="120"/>
          <g transform="translate(170,108)"><rect class="label-bg" x="0" y="-11" width="174" height="16" rx="8"/><text class="label-tag" x="7" y="1">enemy ship · jukes &amp; shoots back</text></g>
          <!-- trajectory -->
          <line class="leader" x1="270" y1="430" x2="300" y2="430"/>
          <g transform="translate(196,424)"><rect class="label-bg" x="0" y="-11" width="178" height="16" rx="8"/><text class="label-tag" x="7" y="1">drag back &amp; release to aim/fire</text></g>
          <!-- shield -->
          <line class="leader" x1="80" y1="660" x2="36" y2="600"/>
          <g transform="translate(8,594)"><rect class="label-bg" x="0" y="-11" width="156" height="16" rx="8"/><text class="label-tag" x="7" y="1">shield arc · 3 segments left</text></g>
          <!-- station -->
          <line class="leader" x1="180" y1="700" x2="180" y2="664"/>
          <g transform="translate(120,658)"><rect class="label-bg" x="0" y="-11" width="120" height="16" rx="8"/><text class="label-tag" x="7" y="1">station you protect</text></g>
          <!-- ammo left -->
          <line class="leader" x1="40" y1="722" x2="14" y2="690"/>
          <g transform="translate(8,684)"><rect class="label-bg" x="0" y="-11" width="160" height="16" rx="8"/><text class="label-tag" x="7" y="1">P1 ammo · auto-refills</text></g>
          <!-- ammo right -->
          <line class="leader" x1="330" y1="722" x2="352" y2="690"/>
          <g transform="translate(236,684)"><rect class="label-bg" x="0" y="-11" width="116" height="16" rx="8"/><text class="label-tag" x="7" y="1">P2 ammo · aiming</text></g>
        </g>
      </svg>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="toggle">Hide labels</button>
  </div>
  <p class="caption">Static layout mock — not playable. Both players sit side by side and each works a slingshot in their corner (<b style="color:#3fe0ff">P1 left</b>, <b style="color:#ffb13b">P2 right</b>), defending the shared station. Asteroids drift; <b style="color:#ff4d7d">ships juke and shoot back</b> for urgency.</p>

<script>
  const svg = document.getElementById('scene');
  const btn = document.getElementById('toggle');
  btn.addEventListener('click', () => {
    svg.classList.toggle('labels-off');
    btn.textContent = svg.classList.contains('labels-off') ? 'Show labels' : 'Hide labels';
  });
</script>
</body>
</html>
