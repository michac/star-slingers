<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Slingers — Retro Pixel Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/mock.css">
<link rel="stylesheet" href="tokens-pixel.css">
</head>
<body>
  <div class="title">STAR SLINGERS<small>Retro Pixel Art · 8-bit skin</small></div>

  <div class="phone">
    <div class="screen">
      <!--
        CANONICAL LAYOUT — viewBox 360x740 (≈ Pixel 6 portrait).
        Style variants: copy this file, swap the tokens link, and re-skin.
        You may redraw art INSIDE the slot <g> elements (and add <defs>),
        but keep every slot's transform/position, the class hooks, and the
        annotation block untouched so layout parity holds across variants.
      -->
      <svg id="scene" viewBox="0 0 360 740" preserveAspectRatio="xMidYMid slice">

        <defs>
          <!-- dither pattern: NES-ish 2px checker for star field / glow texture -->
          <pattern id="dither" width="8" height="8" patternUnits="userSpaceOnUse">
            <rect width="8" height="8" class="dither-bg"/>
            <rect x="0" y="0" width="4" height="4" class="dither-dot"/>
            <rect x="4" y="4" width="4" height="4" class="dither-dot"/>
          </pattern>
          <pattern id="dither-shield" width="6" height="6" patternUnits="userSpaceOnUse">
            <rect x="0" y="0" width="3" height="3" class="dither-shield-dot"/>
            <rect x="3" y="3" width="3" height="3" class="dither-shield-dot"/>
          </pattern>
        </defs>

        <rect class="bg-wash" width="360" height="740"/>
        <g class="stars">
          <circle class="star" cx="220" cy="120" r="1.4"/>
          <circle class="star" cx="300" cy="90"  r="1"/>
          <circle class="star" cx="330" cy="360" r="1.6"/>
          <circle class="star" cx="250" cy="640" r="1"/>
          <circle class="star" cx="200" cy="560" r="1.2"/>
          <circle class="star" cx="320" cy="540" r="1"/>
          <circle class="star" cx="160" cy="380" r="1.1"/>
          <circle class="star" cx="290" cy="270" r="1.3"/>
        </g>

        <!-- ===== SLOT: station (left long side) ===== -->
        <g class="slot-station">
          <!-- blocky hull: stepped rect cluster instead of rounded path -->
          <path class="hull" d="M0,230 h26 a18 18 0 0 1 18 18 v244 a18 18 0 0 1 -18 18 H0 Z"/>
          <g class="hull-pixels">
            <rect class="hull-px" x="0"  y="230" width="36" height="280"/>
            <rect class="hull-px" x="36" y="248" width="8"  height="244"/>
            <rect class="hull-shade" x="0" y="490" width="44" height="20"/>
            <rect class="hull-lite" x="0" y="230" width="44" height="8"/>
          </g>
          <g class="hull-details">
            <circle class="hull-detail" cx="22" cy="290" r="6"/>
            <circle class="hull-detail" cx="22" cy="330" r="6"/>
            <circle class="hull-detail" cx="22" cy="410" r="6"/>
            <circle class="hull-detail" cx="22" cy="450" r="6"/>
            <rect class="hull-window" x="14" y="356" width="16" height="28" rx="4"/>
          </g>
        </g>

        <!-- ===== SLOT: shield arc (vertical, bulging right, 3 segments) ===== -->
        <g class="slot-shield">
          <g class="shield-glow">
            <path class="shield" d="M0,250 A120 120 0 0 1 0,490"/>
            <!-- chunky pixel studs stepped along the arc -->
            <g class="shield-studs">
              <rect class="shield-stud" x="58"  y="262" width="8" height="8"/>
              <rect class="shield-stud" x="86"  y="288" width="8" height="8"/>
              <rect class="shield-stud" x="102" y="324" width="8" height="8"/>
              <rect class="shield-stud" x="108" y="366" width="8" height="8"/>
              <rect class="shield-stud" x="102" y="408" width="8" height="8"/>
              <rect class="shield-stud" x="86"  y="444" width="8" height="8"/>
              <rect class="shield-stud" x="58"  y="470" width="8" height="8"/>
            </g>
          </g>
          <g class="shield-dividers">
            <line class="shield-divider" x1="100" y1="306" x2="108" y2="309"/>
            <line class="shield-divider" x1="100" y1="431" x2="108" y2="434"/>
          </g>
        </g>

        <!-- ===== SLOT: enemies (sweep right -> left) ===== -->
        <g class="slot-enemies">
          <!-- asteroid 1: tough, shows hits-to-break — blocky rock sprite -->
          <g class="driftX"><g class="asteroid" transform="translate(285,330)">
            <path class="rock" d="M-12,-18 h12 v-3 h9 v6 h9 v9 h3 v12 h-3 v9 h-9 v6 h-15 v-3 h-9 v-9 h-3 v-15 h3 v-9 h6 z"/>
            <rect class="crater" x="-9" y="-9" width="7" height="7"/>
            <rect class="crater" x="4" y="1" width="6" height="6"/>
            <text class="hit-count display-text" y="5" text-anchor="middle">2</text>
          </g></g>
          <!-- asteroid 2: small -->
          <g class="driftX2"><g class="asteroid" transform="translate(312,520)">
            <path class="rock" d="M-7,-10 h11 v3 h6 v8 h3 v8 h-6 v3 h-11 v-3 h-6 v-11 h3 z"/>
            <rect class="crater" x="0" y="-5" width="5" height="5"/>
          </g></g>
          <!-- enemy ship 1: points left, jukes, shoots toward station — invader sprite -->
          <g class="jukeY"><g class="ship" transform="translate(278,210)">
            <path class="ship-body" d="M-15,-3 h6 v-3 h6 v-3 h6 v3 h6 v3 h3 v6 h-3 v3 h-6 v3 h-6 v-3 h-6 v-3 h-6 z"/>
            <rect class="ship-cockpit" x="-2" y="-4" width="8" height="8"/>
            <rect class="ship-cockpit-core" x="0" y="-2" width="4" height="4"/>
            <rect class="bolt laser" x="-26" y="-1.6" width="14" height="3.2"/>
          </g></g>
          <!-- enemy ship 2 -->
          <g class="jukeY2"><g class="ship" transform="translate(305,455)">
            <path class="ship-body" d="M-12,-3 h5 v-3 h5 v-3 h4 v3 h5 v3 h3 v6 h-3 v3 h-5 v3 h-4 v-3 h-5 v-3 h-5 z"/>
            <rect class="ship-cockpit" x="-2" y="-3" width="6" height="6"/>
            <rect class="bolt2 laser" x="-22" y="-1.4" width="12" height="2.8"/>
          </g></g>
        </g>

        <!-- ===== SLOT: P1 slingshot (top edge, drawn back, aiming at ship 1) ===== -->
        <g class="slot-p1">
          <path class="sling-frame" d="M180,18 L180,52 M180,52 L164,80 M180,52 L196,80"/>
          <path class="sling-band-p1" d="M164,80 L180,42 M196,80 L180,42"/>
          <g class="rocket-nock" transform="translate(180,46) rotate(35)">
            <path class="rocket" d="M-3,-9 h6 v6 h3 v6 h-3 v3 h-6 v-3 h-3 v-6 h3 z"/>
          </g>
          <text class="ammo-p1 display-text" x="206" y="40">5</text>
          <path class="trajectory" d="M180,50 Q236,118 264,196"/>
        </g>

        <!-- ===== SLOT: P2 slingshot (bottom edge, at rest) ===== -->
        <g class="slot-p2">
          <path class="sling-frame" d="M180,722 L180,688 M180,688 L164,660 M180,688 L196,660"/>
          <path class="sling-band-p2" d="M164,660 Q180,672 196,660"/>
          <text class="ammo-p2 display-text" x="206" y="712">5</text>
        </g>

        <!-- ===== SLOT: HUD (top-left, above station) ===== -->
        <g class="slot-hud">
          <text class="hud-label body-text" x="16" y="40">WAVE</text>
          <text class="hud-value display-text" x="16" y="62">3</text>
          <text class="hud-label body-text" x="16" y="96">SCORE</text>
          <text class="hud-score display-text" x="16" y="118">1240</text>
        </g>

        <!-- ===== ANNOTATIONS (do not modify in style variants) ===== -->
        <g class="annot">
          <line class="leader" x1="44" y1="370" x2="96" y2="370"/>
          <g transform="translate(100,364)"><rect class="label-bg" x="0" y="-11" width="118" height="16" rx="8"/><text class="label-tag" x="7" y="1">station you protect</text></g>

          <line class="leader" x1="118" y1="370" x2="150" y2="320"/>
          <g transform="translate(154,314)"><rect class="label-bg" x="0" y="-11" width="156" height="16" rx="8"/><text class="label-tag" x="7" y="1">shield arc · 3 segments left</text></g>

          <line class="leader" x1="262" y1="330" x2="240" y2="296"/>
          <g transform="translate(150,290)"><rect class="label-bg" x="0" y="-11" width="156" height="16" rx="8"/><text class="label-tag" x="7" y="1">asteroid · "2" = hits to break</text></g>

          <line class="leader" x1="270" y1="200" x2="208" y2="170"/>
          <g transform="translate(36,164)"><rect class="label-bg" x="0" y="-11" width="176" height="16" rx="8"/><text class="label-tag" x="7" y="1">enemy ship · jukes &amp; shoots</text></g>

          <line class="leader" x1="200" y1="90" x2="234" y2="90"/>
          <g transform="translate(238,84)"><rect class="label-bg" x="0" y="-11" width="108" height="16" rx="8"/><text class="label-tag" x="7" y="1">P1 (top) · drags down</text></g>

          <line class="leader" x1="200" y1="660" x2="234" y2="640"/>
          <g transform="translate(238,634)"><rect class="label-bg" x="0" y="-11" width="112" height="16" rx="8"/><text class="label-tag" x="7" y="1">P2 (bottom) · drags up</text></g>

          <g class="annot-flow">
            <path class="leader" d="M300,580 L150,580"/>
            <path class="label-bg" d="M150,580 l10,-6 v12 z"/>
            <g transform="translate(168,560)"><rect class="label-bg" x="0" y="-11" width="150" height="16" rx="8"/><text class="label-tag" x="7" y="1">enemies sweep toward station</text></g>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <div class="controls"><button class="btn" id="toggle">Hide labels</button></div>
  <p class="caption">Static layout mock — not playable. <b>P1 sits at the top</b>, <b>P2 at the bottom</b>, facing each other. The station runs down the left wall behind its shield arc; <b>asteroids and juking ships sweep in from the right</b>. Each player lobs shots across to intercept.</p>

  <script src="../shared/mock.js"></script>
</body>
</html>
