<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- maximum-scale/user-scalable: stop pinch-zoom during two-finger play -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Star Slingers — Sandbox</title>

  <!-- PWA: installable, offline, app icons (B12). All paths relative so they
       resolve under the …/star-slingers/ project subpath. -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0a0626" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Star Slingers" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png" />

  <!-- Audiowide: the neon skin's display+body font. Self-hosted (no Google
       Fonts cross-origin dependency) so it caches offline. main.ts waits for it
       to load before booting Phaser, so text never paints in the fallback. -->
  <link rel="preload" as="font" type="font/woff2" href="./fonts/Audiowide-Regular.woff2" crossorigin />
  <style>
    @font-face {
      font-family: "Audiowide";
      src: url('./fonts/Audiowide-Regular.woff2') format('woff2');
      font-display: swap;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0626;
      overflow: hidden;            /* no page scroll while dragging */
      overscroll-behavior: none;   /* no pull-to-refresh */
    }
    #game { height: 100%; }
    #game canvas {
      display: block;
      touch-action: none;          /* canvas owns all touch gestures */
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
